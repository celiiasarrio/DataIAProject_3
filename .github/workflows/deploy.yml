name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'

env:
  PROJECT_ID: edem-hackathon-2026
  REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev/edem-hackathon-2026/gft-hackaton

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker "$REGION"-docker.pkg.dev --quiet

      - name: Build and push backend image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/backend:$IMAGE_TAG" -t "$REGISTRY/backend:latest" ./backend
          docker push "$REGISTRY/backend:$IMAGE_TAG"
          docker push "$REGISTRY/backend:latest"

      - name: Deploy backend to Cloud Run
        env:
          IMAGE_TAG: ${{ github.sha }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          gcloud run deploy gft-hackaton-backend \
            --image "$REGISTRY/backend:$IMAGE_TAG" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "DB_USER=$DB_USER,DB_PASSWORD=$DB_PASSWORD,DB_HOST=$DB_HOST,DB_PORT=$DB_PORT,DB_NAME=$DB_NAME,JWT_SECRET=$JWT_SECRET"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker "$REGION"-docker.pkg.dev --quiet

      - name: Get backend URL
        id: backend
        run: |
          BACKEND_URL=$(gcloud run services describe gft-hackaton-backend \
            --region "$REGION" --format "value(status.url)")
          echo "url=$BACKEND_URL" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        env:
          IMAGE_TAG: ${{ github.sha }}
          VITE_BACKEND_URL: ${{ steps.backend.outputs.url }}
        run: |
          docker build \
            --build-arg VITE_BACKEND_URL="$VITE_BACKEND_URL" \
            -t "$REGISTRY/frontend:$IMAGE_TAG" \
            -t "$REGISTRY/frontend:latest" \
            ./frontend
          docker push "$REGISTRY/frontend:$IMAGE_TAG"
          docker push "$REGISTRY/frontend:latest"

      - name: Deploy frontend to Cloud Run
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          gcloud run deploy gft-hackaton-frontend \
            --image "$REGISTRY/frontend:$IMAGE_TAG" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated
