name: Deploy Cloud Run

on:
  push:
    branches:
      - main
      - celia
    paths:
      - "agent/**"
      - "backend/**"
      - "frontend/**"
      - "terraform/**"
      - ".github/workflows/deploy-cloud-run.yml"
  workflow_dispatch:

concurrency:
  group: cloud-run-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  PROJECT_ID: project3grupo6
  APP_NAME: project3grupo6
  REGION: europe-west1
  DB_REGION: europe-southwest1
  DB_INSTANCE_NAME: project3grupo6-postgres
  DB_NAME: edem_hub_db
  REGISTRY: europe-west1-docker.pkg.dev/project3grupo6/docker-repo
  BACKEND_SERVICE: project3grupo6-backend
  AGENT_SERVICE: project3grupo6-agent

  TF_VAR_project_id: project3grupo6
  TF_VAR_app_name: project3grupo6
  TF_VAR_region: europe-west1
  TF_VAR_db_region: europe-southwest1
  TF_VAR_db_instance_name: project3grupo6-postgres
  TF_VAR_db_name: edem_hub_db
  TF_VAR_db_user: ${{ secrets.DB_USER }}
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
  TF_VAR_cicd_sa_email: ${{ secrets.GCP_CICD_SA_EMAIL }}

jobs:
  validate:
    name: Validate builds
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile backend
        run: python -m compileall backend

      - name: Compile agent
        run: python -m compileall agent

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    needs: validate
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Set image tags
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          echo "IMAGE_TAG=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "FRONTEND_FINAL_TAG=${SHORT_SHA}-final" >> "$GITHUB_ENV"

      - name: Terraform init
        working-directory: terraform
        run: terraform init

      - name: Ensure Artifact Registry exists
        working-directory: terraform
        run: terraform apply -auto-approve -target=google_artifact_registry_repository.docker

      - name: Build and push backend
        run: |
          docker build \
            -t "${REGISTRY}/backend:${IMAGE_TAG}" \
            -t "${REGISTRY}/backend:latest" \
            backend
          docker push "${REGISTRY}/backend:${IMAGE_TAG}"
          docker push "${REGISTRY}/backend:latest"

      - name: Build and push agent
        run: |
          docker build \
            -t "${REGISTRY}/agent:${IMAGE_TAG}" \
            -t "${REGISTRY}/agent:latest" \
            agent
          docker push "${REGISTRY}/agent:${IMAGE_TAG}"
          docker push "${REGISTRY}/agent:latest"

      - name: Build and push initial frontend
        run: |
          docker build \
            -t "${REGISTRY}/frontend:${IMAGE_TAG}" \
            -t "${REGISTRY}/frontend:latest" \
            frontend
          docker push "${REGISTRY}/frontend:${IMAGE_TAG}"
          docker push "${REGISTRY}/frontend:latest"

      - name: Deploy backend, agent and initial frontend
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="deploy_services=true" \
            -var="backend_image_tag=${IMAGE_TAG}" \
            -var="agent_image_tag=${IMAGE_TAG}" \
            -var="frontend_image_tag=${IMAGE_TAG}"

      - name: Resolve service URLs
        run: |
          BACKEND_URL="$(gcloud run services describe "${BACKEND_SERVICE}" --region "${REGION}" --format 'value(status.url)')"
          AGENT_URL="$(gcloud run services describe "${AGENT_SERVICE}" --region "${REGION}" --format 'value(status.url)')"
          if [ -z "$BACKEND_URL" ] || [ -z "$AGENT_URL" ]; then
            echo "Could not resolve Cloud Run service URLs" >&2
            exit 1
          fi
          echo "BACKEND_URL=${BACKEND_URL}" >> "$GITHUB_ENV"
          echo "AGENT_URL=${AGENT_URL}" >> "$GITHUB_ENV"

      - name: Rebuild and push frontend with service URLs
        run: |
          docker build \
            --build-arg VITE_BACKEND_URL="${BACKEND_URL}" \
            --build-arg VITE_AGENT_URL="${AGENT_URL}" \
            -t "${REGISTRY}/frontend:${FRONTEND_FINAL_TAG}" \
            -t "${REGISTRY}/frontend:latest" \
            frontend
          docker push "${REGISTRY}/frontend:${FRONTEND_FINAL_TAG}"
          docker push "${REGISTRY}/frontend:latest"

      - name: Deploy final frontend image
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="deploy_services=true" \
            -var="backend_image_tag=${IMAGE_TAG}" \
            -var="agent_image_tag=${IMAGE_TAG}" \
            -var="frontend_image_tag=${FRONTEND_FINAL_TAG}"

      - name: Smoke check public endpoints
        run: |
          FRONTEND_URL="$(terraform -chdir=terraform output -raw frontend_url)"
          BACKEND_URL="$(terraform -chdir=terraform output -raw backend_url)"
          AGENT_URL="$(terraform -chdir=terraform output -raw agent_url)"
          curl --fail --silent --show-error "$FRONTEND_URL" >/dev/null
          curl --fail --silent --show-error "$BACKEND_URL/health" >/dev/null
          curl --fail --silent --show-error "$AGENT_URL/health" >/dev/null
          echo "Frontend: $FRONTEND_URL"
          echo "Backend:  $BACKEND_URL"
          echo "Agent:    $AGENT_URL"
