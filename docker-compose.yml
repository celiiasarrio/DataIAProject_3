services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: edem_hub_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init_db_v2.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/init_db_v4.sql:/docker-entrypoint-initdb.d/02_seeds.sql:ro
      - ./db/init_db_v5.sql:/docker-entrypoint-initdb.d/03_users.sql:ro 
      
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edem_hub_db"]
      interval: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    ports: ["8080:8080"]

volumes:
  pgdata: